name: BASH_ENV Injection Test
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: inject — write state with newlines in key
        run: |
          # Normal state
          echo "normal_state=NORMAL" >> $GITHUB_STATE
          
          # Injected state via newline
          printf 'x<<D\nx\nD\ninjected_state<<D2\nSTATE_INJECTED_VIA_NEWLINE\nD2' >> $GITHUB_STATE
          
          echo "GITHUB_STATE contents:"
          cat $GITHUB_STATE
          
          echo ""
          echo "Reading state via env vars:"
          echo "STATE_normal_state=$STATE_normal_state"
          echo "STATE_injected_state=$STATE_injected_state"
          echo "STATE_x=$STATE_x"
          
          echo ""
          echo "Note: state is read in POST steps, not the same step"
