name: BASH_ENV Injection Test
on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create files with traversal-like paths
        run: |
          # Create a file structure that might cause path traversal when extracted
          mkdir -p testdir/sub
          echo "NORMAL_FILE" > testdir/normal.txt
          echo "TRAVERSAL_CANARY_DATA" > testdir/sub/data.txt
          
          # Can I create a symlink that makes the archive path contain ../?
          # Symlink: testdir/link -> ../../etc/hostname
          ln -s ../../etc/hostname testdir/link-hostname
          
          # Also test: hardlink to file outside workspace
          # (hardlinks can't cross filesystem boundaries, so this might fail)
          ln /etc/hostname testdir/hardlink-hostname 2>/dev/null || echo "Hardlink failed (expected)"
          
          ls -la testdir/
          
      - name: Upload with traversal-path entries
        uses: actions/upload-artifact@v4
        with:
          name: path-traversal-test
          path: testdir/
          retention-days: 1

      - name: Download and check extraction paths
        uses: actions/download-artifact@v4
        with:
          name: path-traversal-test
          path: download-dir

      - name: Verify extracted paths
        run: |
          echo "=== Extracted structure ==="
          find download-dir -type f -o -type l | head -20
          echo ""
          echo "=== Check for escaped files ==="
          ls -la download-dir/../ 2>/dev/null | head -5
          echo ""
          echo "=== Content of link-hostname ==="
          cat download-dir/link-hostname 2>/dev/null || echo "link-hostname not found"
