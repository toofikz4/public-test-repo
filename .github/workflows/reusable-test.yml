name: Reusable Workflow - Secret Probe
on:
  workflow_call:
    secrets:
      TEST_SECRET:
        required: false

jobs:
  probe-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Probe secrets context
        env:
          TEST_SECRET: ${{ secrets.TEST_SECRET }}
          MY_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COPILOT_TOKEN: ${{ secrets.COPILOT_TOKEN }}
        run: |
          echo "=== Secret probe from reusable workflow ==="
          echo "TEST_SECRET length: ${#TEST_SECRET}"
          echo "GITHUB_TOKEN length: ${#MY_GITHUB_TOKEN}"
          echo "COPILOT_TOKEN length: ${#COPILOT_TOKEN}"
          echo "GITHUB_REPOSITORY: $GITHUB_REPOSITORY"
