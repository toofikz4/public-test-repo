name: oidc-isolation
on: { workflow_dispatch: {}, push: { branches: ['oidc-test'] } }
permissions:
  id-token: write
  contents: read
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: oidc-claims
        run: |
          TOK=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://attacker-controlled-aud.example" | python3 -c "import sys,json;print(json.load(sys.stdin)['value'])")
          echo "=== OIDC CLAIMS (sub/aud/repo spoofable?) ==="
          echo "$TOK" | cut -d. -f2 | python3 -c "import sys,base64,json; s=sys.stdin.read().strip(); s+='='*(-len(s)%4); d=json.loads(base64.urlsafe_b64decode(s)); print(json.dumps({k:d.get(k) for k in ['sub','aud','repository','repository_owner','ref','environment','actor','run_id','job_workflow_ref']},indent=2))"
      - name: github-token-crossrepo
        env: { GH_TOKEN: "${{ github.token }}" }
        run: |
          echo "=== GITHUB_TOKEN cross-repo access tests ==="
          echo -n "own repo contents (expect 200): "; curl -s -o /dev/null -w "%{http_code}\n" -H "Authorization: token $GH_TOKEN" https://api.github.com/repos/tooforg/public-test-repo/contents/README.md
          echo -n "invisible-repo contents (expect 404): "; curl -s -o /dev/null -w "%{http_code}\n" -H "Authorization: token $GH_TOKEN" https://api.github.com/repos/tooforg/invisible-repo/contents/README.md
          echo -n "private-test-repo contents (expect 404): "; curl -s -o /dev/null -w "%{http_code}\n" -H "Authorization: token $GH_TOKEN" https://api.github.com/repos/tooforg/private-test-repo/contents/README.md
          echo -n "org private repos list via token: "; curl -s -H "Authorization: token $GH_TOKEN" "https://api.github.com/orgs/tooforg/repos?type=private" | python3 -c "import sys,json;d=json.load(sys.stdin);print(d if isinstance(d,dict) else [r['name'] for r in d])"
          echo "token permissions header:"; curl -sI -H "Authorization: token $GH_TOKEN" https://api.github.com/repos/tooforg/public-test-repo | grep -i "x-oauth-scopes\|x-accepted" || echo "(none)"