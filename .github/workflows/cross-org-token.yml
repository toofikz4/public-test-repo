name: Cross-Org GITHUB_TOKEN Test
on: workflow_dispatch
permissions:
  contents: read
  issues: write
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test GITHUB_TOKEN cross-org access
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== GITHUB_TOKEN identity ==="
          curl -sf -H "Authorization: bearer $GITHUB_TOKEN" https://api.github.com/user 2>/dev/null | jq -r ".login // \"no-access\"" || echo "auth-failed"
          
          echo "=== Token rate limit resource ==="
          curl -sI -H "Authorization: bearer $GITHUB_TOKEN" https://api.github.com/rate_limit 2>/dev/null | grep -i x-oauth-scopes || echo "no-scopes"
          
          echo "=== Cross-org: read tooforg/public-test-repo ==="
          curl -sf -o /dev/null -w "HTTP:%{http_code}" -H "Authorization: bearer $GITHUB_TOKEN" \
            https://api.github.com/repos/tooforg/public-test-repo 2>/dev/null || echo "failed"
          echo
          
          echo "=== Cross-org: read tooforg/private-test-repo ==="
          curl -sf -o /dev/null -w "HTTP:%{http_code}" -H "Authorization: bearer $GITHUB_TOKEN" \
            https://api.github.com/repos/tooforg/private-test-repo 2>/dev/null || echo "failed"
          echo
          
          echo "=== Cross-org: list org secrets ==="
          curl -sf -o /dev/null -w "HTTP:%{http_code}" -H "Authorization: bearer $GITHUB_TOKEN" \
            https://api.github.com/orgs/tooforg/actions/secrets 2>/dev/null || echo "failed"
          echo
          
          echo "=== Cross-org: create issue on tooforg repo ==="
          curl -sf -o /dev/null -w "HTTP:%{http_code}" -X POST -H "Authorization: bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/tooforg/public-test-repo/issues \
            -d "{\"title\":\"GITHUB_TOKEN cross-org test $(date +%s)\"}" 2>/dev/null || echo "failed"
          echo
          
          echo "=== DONE ==="
