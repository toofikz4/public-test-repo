name: PR Analysis (vulnerable pattern)
on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: read
  actions: write

jobs:
  analyze-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head (manual - bypasses actions/checkout safety)
        run: |
          git init
          git remote add origin https://github.com/${{ github.repository }}.git
          git fetch origin pull/${{ github.event.pull_request.number }}/head:pr-head
          git checkout pr-head

      - name: Show workspace contents
        run: |
          echo "=== Workspace files ==="
          find . -maxdepth 2 -type l -exec ls -la {} \;
          echo "=== File count ==="
          find . -type f | wc -l

      - name: Upload PR analysis
        uses: actions/upload-artifact@v4
        with:
          name: pr-analysis-${{ github.event.pull_request.number }}
          path: .
          retention-days: 1
