name: pr-secret-probe
on: { pull_request: {} }
permissions: { contents: read }
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: fork-PR secret + token reach
        env: { S: '${{ secrets.CANARY_SECRET }}', GH: '${{ secrets.GITHUB_TOKEN }}' }
        run: |
          echo "event: ${{ github.event_name }} | head_repo: ${{ github.event.pull_request.head.repo.full_name }} | base: ${{ github.repository }}"
          echo "secret-length: ${#S}   (>0 = SECRET LEAKED to fork PR)"
          if [ -z "$S" ]; then echo "secret-empty: YES (defended)"; else echo "secret-empty: NO -- LEAK"; fi
          echo "token write-test PUT contents (expect 403 read-only): $(curl -s -o /dev/null -w '%{http_code}' -X PUT -H "Authorization: token $GH" https://api.github.com/repos/toofikz4/public-test-repo/contents/forkpr-write-probe.txt -d '{"message":"x","content":"eA=="}')"
