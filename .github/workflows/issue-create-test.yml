name: issue-create-test
on:
  workflow_dispatch:

jobs:
  create-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Create issue via GITHUB_TOKEN
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RESP=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues" \
            -d "{\"title\":\"GITHUB_TOKEN bypass test $(date +%s)\",\"body\":\"Created via GITHUB_TOKEN while interaction limit is set to collaborators_only\"}")
          echo "$RESP"
          echo "STATUS: $(echo "$RESP" | tail -1)"
