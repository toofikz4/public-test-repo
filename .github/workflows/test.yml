name: "<svg onload=alert(1)>HTML in workflow name"
on:
  workflow_dispatch:
jobs:
  job1:
    name: "<img src=q onerror=alert(2)>html-job"
    runs-on: ubuntu-latest
    steps:
      - name: "<a href=javascript:alert(3)>html-step"
        run: |
          echo "::error title=<svg onload=alert(4)>::message <img src=x onerror=alert(5)>"
          echo "::warning::warn body <iframe srcdoc='<script>alert(6)</script>'></iframe>"
          echo "::notice::<details><summary>note</summary>secret</details>"
          echo "### Step Summary"
          echo "<svg onload=alert(7)>step-summary-svg"  >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Look at <img src=q onerror=alert(8)>" >> "$GITHUB_STEP_SUMMARY"
